<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Conta confirmada · MorbiusFin</title>
<link rel="icon" href="icons/icon-192.png">
<style>
  :root { --bg:#0b110e; --card:#141d18; --line:#23302a; --ink:#eaf2ee; --muted:#8b9a92; --green:#15c266; --green2:#0fa856; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; }
  body { background: radial-gradient(120% 80% at 50% -10%, #11241b 0%, var(--bg) 60%); color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex; align-items: center; justify-content: center; padding: 24px; min-height: 100dvh; }
  .card { width: 100%; max-width: 400px; background: var(--card); border: 1px solid var(--line); border-radius: 24px;
    padding: 34px 26px 28px; text-align: center; box-shadow: 0 24px 60px rgba(0,0,0,.45); animation: pop .4s cubic-bezier(.2,.8,.2,1); }
  @keyframes pop { from { opacity: 0; transform: translateY(12px) scale(.97); } to { opacity: 1; transform: none; } }
  .peng { font-size: 52px; line-height: 1; }
  .brand { margin-top: 6px; font-size: 22px; font-weight: 800; color: var(--green); letter-spacing: -.3px; }
  .check { margin: 18px auto 0; width: 76px; height: 76px; border-radius: 50%; background: rgba(21,194,102,.14);
    border: 1px solid rgba(21,194,102,.34); display: flex; align-items: center; justify-content: center; font-size: 40px;
    animation: chk .5s .15s cubic-bezier(.34,1.6,.5,1) both; }
  @keyframes chk { from { transform: scale(0); } to { transform: scale(1); } }
  h1 { font-size: 22px; font-weight: 800; margin: 16px 0 6px; letter-spacing: -.3px; }
  p { font-size: 15px; line-height: 1.6; color: var(--muted); margin: 0 0 4px; }
  p b { color: var(--ink); }
  .btn { display: block; width: 100%; margin-top: 22px; background: linear-gradient(180deg, var(--green) 0%, var(--green2) 100%);
    color: #062a18; font-size: 16px; font-weight: 800; text-decoration: none; padding: 16px; border-radius: 16px;
    box-shadow: 0 14px 30px rgba(11,61,46,.45); }
  .btn:active { transform: scale(.97); }
  .note { font-size: 12.5px; color: var(--muted); margin-top: 14px; line-height: 1.55; }
  .foot { margin-top: 20px; font-size: 11.5px; color: #6f7d75; }
</style>
</head>
<body>
  <div class="card">
    <div class="peng">🐧</div>
    <div class="brand">MorbiusFin</div>
    <div class="check">✅</div>
    <h1>Conta confirmada!</h1>
    <p>Seu e-mail foi <b>validado com sucesso</b>.</p>
    <p>Agora é só <b>voltar ao app</b> e entrar com seu e-mail e senha.</p>
    <a class="btn" href="https://morbiusfin.com.br">Abrir o MorbiusFin</a>
    <div class="note">Já instalou na tela de início? Pode <b>fechar esta aba</b> e abrir o ícone do MorbiusFin. 🐧</div>
    <div class="foot">© 2026 MorbiusFin · seus dados ficam no seu aparelho 🔒</div>
  </div>
</body>
</html>
