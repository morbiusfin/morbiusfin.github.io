<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0b3d2e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Finanças" />
  <title>Finanças 2026</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" />
  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" defer></script>
</head>
<body>
  <!-- SPLASH DE ABERTURA -->
  <div id="splash">
    <svg class="splash-logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <defs><linearGradient id="spg" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#16e08a"/><stop offset="1" stop-color="#0b3d2e"/></linearGradient></defs>
      <rect width="100" height="100" rx="26" fill="url(#spg)"/>
      <polyline points="20,68 40,50 54,58 80,28" fill="none" stroke="#fff" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round"/>
      <polyline points="66,28 80,28 80,42" fill="none" stroke="#fff" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="20" cy="68" r="5.5" fill="#fff"/>
    </svg>
    <div class="splash-name">Finanças 2026</div>
    <div class="splash-bar"><i></i></div>
  </div>

  <!-- HEADER -->
  <header class="app-header">
    <div class="header-row">
      <h1 id="screenTitle">Resumo</h1>
      <div class="header-actions">
        <button id="btnRefresh" class="icon-btn" aria-label="Atualizar" title="Atualizar agora">🔄</button>
        <button id="btnUndo" class="icon-btn" aria-label="Desfazer" title="Desfazer (Ctrl+Z)">↩︎</button>
        <button id="btnRedo" class="icon-btn" aria-label="Refazer" title="Refazer (Ctrl+Y)">↪︎</button>
        <button id="btnSettings" class="icon-btn" aria-label="Configurações">⚙️</button>
      </div>
    </div>
    <div class="month-bar" id="monthBar"></div>
  </header>

  <!-- TELA DE BLOQUEIO (PIN) -->
  <div id="lockScreen" class="lock hidden">
    <div class="lock-box">
      <div class="lock-emoji">🔒</div>
      <h2 id="lockTitle">Digite seu PIN</h2>
      <input id="lockPin" type="password" inputmode="numeric" maxlength="16" class="lock-input" autocomplete="off" placeholder="••••" />
      <div id="lockMsg" class="lock-msg"></div>
      <button id="lockBtn" class="btn primary" style="width:100%">Entrar</button>
    </div>
  </div>

  <!-- PULL TO REFRESH -->
  <div id="ptr" class="ptr"><span id="ptrText">↓ puxe para atualizar</span></div>

  <!-- BARRA DE PROGRESSO DA SINCRONIZAÇÃO -->
  <div id="syncProg" class="sync-prog hidden">
    <div class="sync-card">
      <div id="syncProgMsg" class="sync-msg">Atualizando…</div>
      <div class="sync-track"><div id="syncProgBar" class="sync-fill"></div></div>
    </div>
  </div>

  <!-- BANNER DE VERSÃO -->
  <div id="verBanner" class="ver-banner hidden"></div>

  <!-- MAIN CONTENT -->
  <main id="view"></main>

  <!-- FLOATING ADD BUTTON -->
  <button id="fab" class="fab" aria-label="Adicionar">+</button>

  <!-- BOTTOM NAV -->
  <nav class="tabbar">
    <button class="tab active" data-tab="resumo"><span>📊</span>Resumo</button>
    <button class="tab" data-tab="receitas"><span>💰</span>Receitas</button>
    <button class="tab" data-tab="fixas"><span>📌</span>Fixas</button>
    <button class="tab" data-tab="cartao"><span>💳</span>Cartão</button>
    <button class="tab" data-tab="diaria"><span>🛒</span>Débito</button>
  </nav>

  <!-- MODAL: editar/adicionar -->
  <div id="modal" class="modal hidden">
    <div class="modal-card">
      <h2 id="modalTitle">Novo lançamento</h2>
      <form id="entryForm"></form>
      <div class="modal-actions">
        <button type="button" id="btnDelete" class="btn danger hidden">Excluir</button>
        <button type="button" id="btnCancel" class="btn ghost">Cancelar</button>
        <button type="submit" form="entryForm" class="btn primary">Salvar</button>
      </div>
    </div>
  </div>

  <!-- MODAL: configurações -->
  <div id="settingsModal" class="modal hidden">
    <div class="modal-card">
      <h2>Configurações</h2>
      <label class="field">
        <span>Saldo inicial do ano (R$)</span>
        <input type="number" id="saldoInicial" step="0.01" />
      </label>
      <div class="settings-buttons">
        <button class="btn ghost" id="btnExport">⬇️ Exportar backup (.json)</button>
        <button class="btn ghost" id="btnImport">⬆️ Importar backup</button>
        <input type="file" id="importFile" accept="application/json" hidden />
        <button class="btn danger" id="btnReset">♻️ Restaurar dados de exemplo</button>
      </div>
      <div id="notifWrap" style="margin:12px 0"></div>
      <p class="hint">Seus dados ficam salvos neste aparelho. Faça backup de vez em quando.</p>
      <div class="modal-actions">
        <button type="button" class="btn primary" id="btnCloseSettings">Fechar</button>
      </div>
    </div>
  </div>

  <!-- MODAL: configurar sincronização (caixa de verdade, funciona no iPhone instalado) -->
  <div id="syncModal" class="modal hidden">
    <div class="modal-card">
      <h2>Sincronizar com a web</h2>
      <p class="hint" style="margin-bottom:10px">Cole aqui o <b>link mágico</b> que o assistente te mandou. Eu extraio o resto sozinho.</p>
      <label class="field">
        <span>Link mágico (ou link que termina em /exec)</span>
        <input type="text" id="syncLinkInput" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" inputmode="url" placeholder="https://kaickjrx.github.io/financas/#cfg=…" />
      </label>
      <label class="field" id="syncTokenField" style="display:none">
        <span>Token de sincronização</span>
        <input type="text" id="syncTokenInput" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" />
      </label>
      <div id="syncModalMsg" class="lock-msg"></div>
      <div class="modal-actions">
        <button type="button" class="btn ghost" id="syncCancel">Cancelar</button>
        <button type="button" class="btn primary" id="syncSave">Salvar e sincronizar</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="js/data.js" defer></script>
  <script src="js/app.js" defer></script>
</body>
</html>
